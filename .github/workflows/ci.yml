name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "mysql://root@127.0.0.1:3306/farmavida_next"
      AUTH_SECRET: "ci-placeholder-secret-not-used-in-tests"
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_NAME: "FarmaVida"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
