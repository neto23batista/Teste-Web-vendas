name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Estático + unitários (sem banco: o build gera o Prisma Client sem conectar
  # e os testes unitários mockam o prisma).
  qualidade:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/farmavida_next"
      AUTH_SECRET: "ci-placeholder-secret-not-used-in-tests"
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_NAME: "FarmaVida"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # E2E de verdade: Postgres de serviço (descartável) migrado + semeado,
  # build de produção (CSP estrita ativa) e Playwright — incluindo os specs
  # que escrevem no banco (E2E_ALLOW_WRITES=1 é seguro aqui).
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: farmavida
          POSTGRES_PASSWORD: farmavida
          POSTGRES_DB: farmavida
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U farmavida"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: "postgresql://farmavida:farmavida@localhost:5432/farmavida"
      DATABASE_URL_UNPOOLED: "postgresql://farmavida:farmavida@localhost:5432/farmavida"
      AUTH_SECRET: "ci-e2e-secret"
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "http://localhost:3210"
      NEXT_PUBLIC_APP_NAME: "FarmaVida"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3210"
      E2E_ALLOW_WRITES: "1"
      PW_WEB_COMMAND: "npx next start -p 3210"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
